<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minimal Blog Card</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="page">
    <article class="card">
      <img
        class="card__image"
        src="https://images.unsplash.com/photo-1509423350716-97f9360b4e09?w=400&h=304&fit=crop"
        alt="A small potted cactus on a wooden stand against a soft pink background">

      <div class="card__body">
        <span class="card__tag">Design</span>

        <h2 class="card__title">Embracing Minimalism</h2>

        <p class="card__description">
          From minimalist sculptures to minimalist paintings, this blog
          will inspire you to appreciate the beauty that lies in simplicity.
        </p>

        <p class="card__author">Aleena Sparen</p>
      </div>
    </article>
  </main>

</body>
</html>
